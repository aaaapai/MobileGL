name: Test

on:
  push:
    branches:
      - dev
      - Feat/Backend-Direct-GLES

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # TEST_ROOT: ${{github.workspace}}/MobileGL/MG_Test
      TEST_ROOT: ${{github.workspace}}

    steps:
      - name: Set Swap Space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 32

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Get CMake
        uses: lukka/get-cmake@latest

      - name: Update glslang external sources
        working-directory: ${{env.TEST_ROOT}}/3rdparty/glslang
        run: python update_glslang_sources.py

      - name: Configure CMake
        working-directory: ${{env.TEST_ROOT}}
        run: |
          if [ "${{ secrets.ACTIONS_STEP_DEBUG }}" == "true" ]; then
            cmake -S . -B build-test -DCMAKE_BUILD_TYPE=Debug -DBUILD_TEST=ON -DBUILD_BENCHMARK=OFF -DCMAKE_POLICY_VERSION_MINIMUM=3.5
          else
            cmake -S . -B build-test -DCMAKE_BUILD_TYPE=Release -DBUILD_TEST=ON -DBUILD_BENCHMARK=OFF -DCMAKE_POLICY_VERSION_MINIMUM=3.5
          fi
          
      - name: Build
        working-directory: ${{env.TEST_ROOT}}/build-test
        run: cmake --build . --parallel 4

      - name: Test
        working-directory: ${{env.TEST_ROOT}}/build-test/MobileGL/MG_Test
        run: |
          if [ "${{ secrets.ACTIONS_STEP_DEBUG }}" == "true" ]; then
            ctest -V
          else
            ctest
          fi
