name: Build MobileGL

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@main
      with:
        submodules: recursive
        fetch-depth: 1

    - name: Configure CMake and Build
      run: |
          bash android_ci_build.bash

    - name: Upload build output
      uses: actions/upload-artifact@main
      with:
        name: MG
        path: build/*.so

