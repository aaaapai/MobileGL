name: Clean All Branches Workflows - Keep Last 1 Day - FIXED

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: '模拟运行（只查看不删除）'
        required: true
        default: 'true'
        type: boolean
      confirm_delete:
        description: 'dry_run=false时，输入"YES"确认删除'
        required: true
        default: ''
        type: string
      concurrency:
        description: '并发数（默认10）'
        required: true
        default: '10'
        type: string
      target_branch:
        description: '指定分支（留空则处理所有分支）'
        required: false
        default: ''
        type: string

jobs:
  clean:
    runs-on: ubuntu-latest
    
    permissions:
      actions: write
      contents: read
      
    steps:
    - name: Check confirmation
      if: ${{ github.event.inputs.dry_run == 'false' && github.event.inputs.confirm_delete != 'YES' }}
      run: |
        echo "❌ 操作取消：未确认删除"
        echo "dry_run=false 时需要输入 confirm_delete=YES"
        exit 1
    
    - name: Clean workflow runs from all branches
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        REPO: ${{ github.repository }}
        DRY_RUN: ${{ github.event.inputs.dry_run }}
        CONCURRENCY: ${{ github.event.inputs.concurrency }}
        TARGET_BRANCH: ${{ github.event.inputs.target_branch }}
      run: |
        # 计算1天前的日期
        CUTOFF_DATE=$(date -d "1 day ago" -u +"%Y-%m-%dT%H:%M:%SZ")
        echo "🔍 清理配置:"
        echo "   仓库: $REPO"
        if [ -n "$TARGET_BRANCH" ]; then
          echo "   目标分支: $TARGET_BRANCH"
        else
          echo "   目标分支: 所有分支"
        fi
        echo "   保留: 1天内的运行（<$CUTOFF_DATE 的将被删除）"
        echo "   模拟运行: $DRY_RUN"
        echo "   并发数: $CONCURRENCY"
        echo ""
        
        # 获取所有分支（如果不指定分支）
        if [ -z "$TARGET_BRANCH" ]; then
          echo "📋 获取所有分支..."
          BRANCHES=$(gh api repos/$REPO/branches --paginate | jq -r '.[].name')
          BRANCH_COUNT=$(echo "$BRANCHES" | wc -l)
          echo "找到 $BRANCH_COUNT 个分支"
        else
          BRANCHES="$TARGET_BRANCH"
          echo "仅处理指定分支: $TARGET_BRANCH"
        fi
        
        # 创建临时文件来存储统计信息
        DELETED_FILE=$(mktemp)
        SKIPPED_FILE=$(mktemp)
        RUNNING_FILE=$(mktemp)
        RUNS_TO_DELETE_FILE=$(mktemp)
        
        echo "0" > $DELETED_FILE
        echo "0" > $SKIPPED_FILE
        echo "0" > $RUNNING_FILE
        
        # 遍历每个分支
        for BRANCH in $BRANCHES; do
          echo -e "\n📦 处理分支: $BRANCH"
          
          PAGE=1
          BRANCH_DELETED=0
          BRANCH_SKIPPED=0
          BRANCH_RUNNING=0
          
          while true; do
            # 获取该分支的工作流运行
            echo "   获取第 $PAGE 页..."
            
            # 直接使用gh获取运行列表
            RUNS=$(gh api repos/$REPO/actions/runs \
              --method GET \
              -F branch="$BRANCH" \
              -F per_page=100 \
              -F page=$PAGE 2>/dev/null)
            
            # 检查是否成功
            if [ $? -ne 0 ]; then
              echo "   警告: 获取分支 $BRANCH 第 $PAGE 页失败"
              break
            fi
            
            # 提取运行列表
            RUNS_COUNT=$(echo "$RUNS" | jq '.workflow_runs | length')
            if [ "$RUNS_COUNT" -eq "0" ]; then
              break
            fi
            
            # 使用数组存储运行信息
            RUN_IDS=($(echo "$RUNS" | jq -r '.workflow_runs[].id'))
            RUN_NAMES=($(echo "$RUNS" | jq -r '.workflow_runs[].name // "未命名"'))
            RUN_DATES=($(echo "$RUNS" | jq -r '.workflow_runs[].created_at'))
            RUN_STATUSES=($(echo "$RUNS" | jq -r '.workflow_runs[].status'))
            
            # 处理每个运行
            for i in "${!RUN_IDS[@]}"; do
              RUN_ID="${RUN_IDS[$i]}"
              RUN_NAME="${RUN_NAMES[$i]}"
              RUN_DATE="${RUN_DATES[$i]}"
              RUN_STATUS="${RUN_STATUSES[$i]}"
              
              # 检查运行状态
              if [ "$RUN_STATUS" = "in_progress" ] || [ "$RUN_STATUS" = "queued" ] || [ "$RUN_STATUS" = "pending" ]; then
                echo "     ⏳ 跳过进行中的运行 #$RUN_ID - $RUN_NAME (状态: $RUN_STATUS)"
                BRANCH_RUNNING=$((BRANCH_RUNNING + 1))
                continue
              fi
              
              # 检查日期
              if [[ "$RUN_DATE" > "$CUTOFF_DATE" ]]; then
                echo "     ✅ 保留1天内的运行 #$RUN_ID (日期: $RUN_DATE)"
                BRANCH_SKIPPED=$((BRANCH_SKIPPED + 1))
                continue
              fi
              
              # 添加到删除列表
              echo "     🗑️ 标记删除 #$RUN_ID - $RUN_NAME (日期: $RUN_DATE)"
              echo "$RUN_ID" >> $RUNS_TO_DELETE_FILE
              BRANCH_DELETED=$((BRANCH_DELETED + 1))
            done
            
            # 检查是否有下一页
            TOTAL_COUNT=$(echo "$RUNS" | jq '.total_count')
            if [ $((PAGE * 100)) -ge "$TOTAL_COUNT" ]; then
              break
            fi
            PAGE=$((PAGE + 1))
            sleep 0.5
          done
          
          echo "   分支 $BRANCH 统计: 删除: $BRANCH_DELETED, 保留: $BRANCH_SKIPPED, 进行中: $BRANCH_RUNNING"
          
          # 更新全局统计
          echo $(($(cat $DELETED_FILE) + BRANCH_DELETED)) > $DELETED_FILE
          echo $(($(cat $SKIPPED_FILE) + BRANCH_SKIPPED)) > $SKIPPED_FILE
          echo $(($(cat $RUNNING_FILE) + BRANCH_RUNNING)) > $RUNNING_FILE
        done
        
        # 读取最终统计
        TOTAL_DELETED=$(cat $DELETED_FILE)
        TOTAL_SKIPPED=$(cat $SKIPPED_FILE)
        TOTAL_RUNNING=$(cat $RUNNING_FILE)
        TOTAL_RUNS=$((TOTAL_DELETED + TOTAL_SKIPPED + TOTAL_RUNNING))
        
        echo -e "\n📊 总体统计:"
        echo "   总运行数: $TOTAL_RUNS"
        echo "   待删除: $TOTAL_DELETED 个"
        echo "   1天内保留: $TOTAL_SKIPPED 个"
        echo "   进行中: $TOTAL_RUNNING 个"
        
        if [ $TOTAL_DELETED -eq 0 ]; then
          echo "✅ 没有需要删除的工作流运行"
          rm -f $DELETED_FILE $SKIPPED_FILE $RUNNING_FILE $RUNS_TO_DELETE_FILE
          exit 0
        fi
        
        # 模拟运行
        if [ "$DRY_RUN" = "true" ]; then
          echo -e "\n🔍 [模拟模式] 将删除以上 $TOTAL_DELETED 个工作流运行"
          echo "设置 dry_run=false 并输入 confirm_delete=YES 实际删除"
          rm -f $DELETED_FILE $SKIPPED_FILE $RUNNING_FILE
          rm -f $RUNS_TO_DELETE_FILE
          exit 0
        fi
        
        # 实际删除
        echo -e "\n🗑️ 开始删除 $TOTAL_DELETED 个工作流运行（并发: $CONCURRENCY）..."
        
        # 读取所有要删除的ID
        mapfile -t RUN_IDS_TO_DELETE < $RUNS_TO_DELETE_FILE
        
        # 并行删除
        DELETED=0
        FAILED=0
        
        for RUN_ID in "${RUN_IDS_TO_DELETE[@]}"; do
          DELETED=$((DELETED + 1))
          echo -ne "\r进度: [$DELETED/$TOTAL_DELETED] 删除 #$RUN_ID..."
          
          if gh api -X DELETE repos/$REPO/actions/runs/$RUN_ID --silent 2>/dev/null; then
            echo -e "\r✓ [$DELETED/$TOTAL_DELETED] 删除成功 #$RUN_ID"
          else
            FAILED=$((FAILED + 1))
            echo -e "\r✗ [$DELETED/$TOTAL_DELETED] 删除失败 #$RUN_ID"
          fi
          
          # 控制并发
          if [ $((DELETED % CONCURRENCY)) -eq 0 ]; then
            sleep 1
          fi
        done
        
        echo -e "\n✅ 删除完成！"
        echo "   总计: $TOTAL_DELETED"
        echo "   成功: $((TOTAL_DELETED - FAILED))"
        echo "   失败: $FAILED"
        
        # 清理临时文件
        rm -f $DELETED_FILE $SKIPPED_FILE $RUNNING_FILE $RUNS_TO_DELETE_FILE
