name: Clean All Workflows - Keep Last 1 Day

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: '仅查看要删除的运行（不实际删除）'
        required: true
        default: 'false'
        type: boolean

jobs:
  clean:
    runs-on: ubuntu-latest
    
    permissions:
      actions: write
      contents: read
      
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Delete all workflow runs older than 1 day
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        REPO: ${{ github.repository }}
        DRY_RUN: ${{ github.event.inputs.dry_run }}
      run: |
        # 计算1天前的日期
        CUTOFF_DATE=$(date -d "1 day ago" +%s)
        
        echo "清理配置:"
        echo "  仓库: $REPO"
        echo "  保留: 最近1天的工作流"
        echo "  模拟运行: $DRY_RUN"
        echo "  截止时间: $(date -d @$CUTOFF_DATE)"
        echo ""
        
        # 获取所有工作流运行
        PAGE=1
        TOTAL_DELETED=0
        TOTAL_SKIPPED=0
        
        while true; do
          echo "获取第 $PAGE 页数据..."
          
          # 获取一页运行记录
          RESPONSE=$(gh api repos/$REPO/actions/runs?per_page=100\&page=$PAGE)
          
          # 检查是否有更多数据
          RUNS_COUNT=$(echo "$RESPONSE" | jq '.workflow_runs | length')
          if [ "$RUNS_COUNT" -eq "0" ]; then
            break
          fi
          
          # 处理当前页的每个运行
          echo "$RESPONSE" | jq -c '.workflow_runs[]' | while read -r run; do
            RUN_ID=$(echo "$run" | jq -r '.id')
            RUN_NAME=$(echo "$run" | jq -r '.name // "未命名"')
            RUN_DATE=$(echo "$run" | jq -r '.created_at')
            RUN_TIMESTAMP=$(date -d "$RUN_DATE" +%s)
            RUN_STATUS=$(echo "$run" | jq -r '.status')
            RUN_WORKFLOW=$(echo "$run" | jq -r '.workflow_id')
            
            # 检查运行状态
            if [ "$RUN_STATUS" = "in_progress" ] || [ "$RUN_STATUS" = "queued" ] || [ "$RUN_STATUS" = "pending" ]; then
              echo "⏳ 跳过进行中的运行 #$RUN_ID - $RUN_NAME (状态: $RUN_STATUS)"
              TOTAL_SKIPPED=$((TOTAL_SKIPPED + 1))
              continue
            fi
            
            # 检查是否在1天内
            if [ "$RUN_TIMESTAMP" -gt "$CUTOFF_DATE" ]; then
              echo "✅ 保留1天内的运行 #$RUN_ID - $RUN_NAME (日期: $RUN_DATE)"
              TOTAL_SKIPPED=$((TOTAL_SKIPPED + 1))
              continue
            fi
            
            # 删除超过1天的运行
            if [ "$DRY_RUN" = "true" ]; then
              echo "🔍 [模拟] 将删除运行 #$RUN_ID - $RUN_NAME (日期: $RUN_DATE)"
            else
              echo "🗑️ 正在删除运行 #$RUN_ID - $RUN_NAME (日期: $RUN_DATE)"
              if gh api -X DELETE repos/$REPO/actions/runs/$RUN_ID; then
                echo "   ✓ 删除成功"
              else
                echo "   ✗ 删除失败"
              fi
            fi
            TOTAL_DELETED=$((TOTAL_DELETED + 1))
            
            # 添加小延迟避免API限流
            sleep 0.5
          done
          
          # 检查是否有下一页
          HAS_NEXT=$(echo "$RESPONSE" | jq '.total_count > 100 * '"$PAGE")
          if [ "$HAS_NEXT" != "true" ]; then
            break
          fi
          
          PAGE=$((PAGE + 1))
        done
        
        echo ""
        echo "========== 清理完成 =========="
        echo "总删除数: $TOTAL_DELETED"
        echo "总保留数: $TOTAL_SKIPPED"
        
        if [ "$DRY_RUN" = "true" ]; then
          echo ""
          echo "⚠️ 这是模拟运行，没有实际删除任何内容"
          echo "如需实际删除，请将 dry_run 设置为 false"
        fi
